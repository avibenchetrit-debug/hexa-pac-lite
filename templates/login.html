<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connexion — Hexa-Rénov'</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #1A2233; }
  .login-split { display: flex; min-height: 100vh; }
  /* GAUCHE : photo pleine hauteur, cadrée cover (pas déformée) */
  .login-visual {
    flex: 1 1 50%;
    background: #002E5A url('/static/login-pac.png') center / cover no-repeat;
  }
  /* DROITE : formulaire centré verticalement */
  .login-pane {
    flex: 1 1 50%;
    display: flex; align-items: center; justify-content: center;
    padding: 32px;
    background: radial-gradient(1200px 600px at 80% -10%, #F3F7FC 0%, #EEF2F7 55%);
  }
  .login-card { width: 360px; max-width: 100%; }
  .login-brand { font-weight: 800; color: #002E5A; font-size: 24px; line-height: 1.15; }
  .login-sub { color: #64748B; font-size: 14px; margin: 4px 0 22px; }
  .login-card label { display: block; font-size: 12px; font-weight: 600; color: #334155; margin: 12px 0 4px; }
  .login-card input {
    width: 100%; border: 1px solid #CBD5E1; border-radius: 8px;
    padding: 11px 12px; font-size: 15px; font-family: inherit;
  }
  .login-card input:focus { border-color: #002E5A; outline: none; box-shadow: 0 0 0 3px rgba(0, 46, 90, .12); }
  .login-btn {
    width: 100%; margin-top: 20px; background: #002E5A; color: #fff; border: 0;
    border-radius: 8px; padding: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .login-btn:hover { background: #013a72; }
  .login-btn:disabled { opacity: .6; cursor: default; }
  .login-err {
    margin-top: 14px; background: #FDE8EC; color: #B91C1C; border: 1px solid #F4B3BF;
    border-radius: 8px; padding: 9px 11px; font-size: 13px; text-align: center;
  }
  /* RESPONSIVE : mobile -> photo en bandeau au-dessus, formulaire plein */
  @media (max-width: 820px) {
    .login-split { flex-direction: column; }
    .login-visual { flex: 0 0 170px; }
    .login-pane { flex: 1 1 auto; padding: 28px 22px; }
    .login-card { width: 100%; max-width: 380px; }
  }
</style>
</head>
<body>
<div class="login-split">
  <div class="login-visual" role="img" aria-label="Pompe à chaleur air-eau"></div>
  <div class="login-pane">
    <form class="login-card" id="login-form" autocomplete="on">
      <div class="login-brand">Hexa-Rénov' PAC Air-Eau</div>
      <div class="login-sub">Connexion au CRM</div>
      <label for="username">Identifiant</label>
      <input id="username" name="username" autocomplete="username" autocapitalize="none" spellcheck="false" autofocus required>
      <label for="password">Mot de passe</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit" class="login-btn" id="login-btn">Se connecter</button>
      <div class="login-err" id="login-error" hidden></div>
    </form>
  </div>
</div>
<script>
  (function(){
    var form = document.getElementById('login-form');
    var err = document.getElementById('login-error');
    var btn = document.getElementById('login-btn');
    form.addEventListener('submit', async function(e){
      e.preventDefault();
      err.hidden = true; btn.disabled = true;
      try {
        var r = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        if (r.ok) { window.location.replace('/'); return; }
        var b = await r.json().catch(function(){ return {}; });
        err.textContent = b.detail || 'Identifiant ou mot de passe incorrect';
        err.hidden = false;
      } catch(_) {
        err.textContent = 'Erreur réseau, réessayez.';
        err.hidden = false;
      }
      btn.disabled = false;
    });
  })();
</script>
</body>
</html>
